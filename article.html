<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article - GameVault</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@500;700&family=JetBrains+Mono:wght@700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/articles.css">

    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
</head>

<body>

    <main class="container" style="padding-top:var(--space-xl); padding-bottom:var(--space-3xl);" id="art-main">

        <div style="margin-bottom:var(--space-md)">
            <span id="art-cat" class="tag-pill"
                style="background:var(--color-accent); color:white; font-size:0.9rem; margin-bottom:12px; display:inline-block">Category</span>
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <h1 id="art-title"
                    style="font-size: clamp(2rem, 4vw, 3.5rem); line-height:1.2; margin-bottom:16px; flex:1;">
                    Loading...</h1>
                <button id="btn-bookmark-header"
                    style="background:none; border:none; color:var(--color-text-3); font-size:2rem; cursor:pointer;"
                    title="Save Article">🔖</button>
            </div>
            <div style="color:var(--color-text-2)">
                By <span id="art-author" style="color:var(--color-text-1); font-weight:bold"></span> • <span
                    id="art-date"></span> • <span id="art-read"></span>
            </div>
        </div>

        <img id="art-hero" class="article-hero-bg" src="assets/placeholder.jpg" />

        <div class="article-layout">
            <!-- Left Body -->
            <div>
                <div id="art-body" class="article-body"></div>
                <div id="art-tags" style="margin-top:var(--space-2xl); display:flex; gap:8px; flex-wrap:wrap"></div>

                <div
                    style="margin-top:var(--space-2xl); padding-top:var(--space-xl); border-top:1px solid var(--color-border); display:flex; align-items:center; gap:var(--space-lg)">
                    <strong style="color:var(--color-text-2); text-transform:uppercase">Share:</strong>
                    <button id="btn-share" class="btn-ghost" style="padding:6px 12px; font-size:12px">Copy Link</button>
                </div>
            </div>

            <!-- Right Sidebar -->
            <aside>
                <div id="sidebar-game" style="margin-bottom:var(--space-2xl); display:none">
                    <h3
                        style="font-size:1.1rem; text-transform:uppercase; color:var(--color-text-2); border-bottom:1px solid var(--color-border); padding-bottom:8px; margin-bottom:16px">
                        Related Game</h3>
                    <div id="sidebar-game-card"></div>
                </div>

                <div id="sidebar-more" style="display:none">
                    <h3
                        style="font-size:1.1rem; text-transform:uppercase; color:var(--color-text-2); border-bottom:1px solid var(--color-border); padding-bottom:8px; margin-bottom:16px">
                        More in this category</h3>
                    <div id="sidebar-more-list" style="display:flex; flex-direction:column; gap:16px"></div>
                </div>
            </aside>
        </div>

    </main>

    <script type="module" src="js/article.js"></script>
</body>

</html>
