<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upcoming Releases - GameVault</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@500;700&family=JetBrains+Mono:wght@700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/upcoming.css">

    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
</head>

<body>

    <main class="container" style="padding-top:var(--space-2xl); padding-bottom:var(--space-3xl); max-width:1000px">

        <div style="text-align:center; margin-bottom:var(--space-2xl)">
            <h1 style="font-size:3rem; margin-bottom:8px">Upcoming Releases</h1>
            <p class="text-muted" style="font-size:1.1rem">The most anticipated games launching in the next 6 months.
            </p>
        </div>

        <div class="platform-tabs" id="platform-tabs">
            <button class="tab-btn active" data-filter="all">All Platforms</button>
            <button class="tab-btn" data-filter="pc">PC</button>
            <button class="tab-btn" data-filter="console">Console</button>
            <button class="tab-btn" data-filter="mobile">Mobile</button>
        </div>

        <div id="calendar-container">
            <div style="text-align:center; padding:50px; color:var(--color-text-3)">Loading calendar...</div>
        </div>

    </main>

    <script type="module" src="js/upcoming.js"></script>
</body>

</html>
